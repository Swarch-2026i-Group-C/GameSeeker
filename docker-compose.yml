version: "3.9"

services:
  user-service:
    build:
      context: ./user-service
    container_name: user-service
    ports:
      - "3001:3000"
    env_file:
      - ./user-service/.env
    depends_on:
      - postgres
    restart: always

  postgres:
    image: postgres:15
    container_name: user-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
