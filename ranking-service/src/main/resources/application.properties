# Server
server.port=${SERVER_PORT:6001}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.connect-timeout=2000ms
spring.data.redis.timeout=2000ms

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Ranking Service Config
ranking.queue.name=${RABBITMQ_RANKING_QUEUE:ranking_prices_queue}
ranking.redis.ttl-hours=24
ranking.default-limit=10
ranking.max-limit=50

# Logging
logging.level.com.gameseeker.ranking=INFO
logging.level.org.springframework.amqp=WARN
logging.level.org.springframework.data.redis=WARN

# Swagger
springdoc.api-docs.path=/docs
springdoc.swagger-ui.path=/ui
